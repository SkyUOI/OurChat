name: ourchat
description: "A chat application"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  logger: ^2.4.0
  protobuf: ^6.0.0
  grpc: ^5.1.0
  fixnum: ^1.1.1
  path_provider: ^2.1.5
  drift: ^2.30.0
  drift_flutter: ^0.2.4
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  image_picker: ^1.2.0
  hashlib: ^2.2.0
  cached_network_image: ^3.4.1
  window_manager: ^0.5.1
  tray_manager: ^0.5.1
  # wait for PR
  # flutter_markdown_plus: ^1.0.5
  flutter_markdown_plus:
    git:
      url: git@github.com:senlinjun/flutter_markdown_plus.git
      ref: noScroll
  markdown: ^7.3.0
  sqlite3: ^2.9.4 # Required for drift on Web
  http: ^1.2.2
  # wait for PR
  # ota_update: ^7.1.0
  ota_update:
    git:
      url: git@github.com:senlinjun/ota_update.git
      ref: desktop_dev
  device_info_plus: ^12.3.0
  flutter_cache_manager: ^3.4.1
  image_compression:
    git:
      url: git@github.com:skyuoi/image_compression.git
      ref: main
  mime: ^1.0.0
  flutter_single_instance:
    git:
      url: git@github.com:SkyUOI/flutter_single_instance.git
      ref: main
  hooks_riverpod: ^3.3.0
  flutter_hooks:
  riverpod_annotation: ^4.0.2
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

dev_dependencies:
  # flutter_test:
  #   sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.30.0
  build_runner: ^2.13.1
  build_web_compilers: ^4.0.3
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - path: web/sqlite3.wasm
      platforms: [web]
    - path: web/drift_worker.js
      platforms: [web]
    - path: web/drift_worker.min.js
      platforms: [web]
